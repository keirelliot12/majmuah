name: islamic
description: Aplikasi resmi An-Nibros teman mendekatkan diri kepada Allah

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.3 <4.0.0'   # Sesuaikan dengan lock file Annibros

dependencies:
  flutter:
    sdk: flutter

  # --- UI COMPONENTS ---
  cupertino_icons: ^1.0.8          # Lock File: 1.0.8
  flutter_screenutil: ^5.9.3       # Lock File: 5.9.3
  flutter_svg: ^2.2.3              # Lock File: 2.2.3
  dots_indicator: ^4.0.1           # Lock File: 4.0.1
  google_fonts: ^8.0.0             # Lock File: 8.0.0
  material_symbols_icons: ^4.2892.0

  # --- LOGIC & STATE ---
  flutter_bloc: ^8.1.6             # Lock File: 8.1.6 (Aman)
  equatable: ^2.0.8
  dartz: ^0.10.1
  get_it: ^9.2.0                   # Lock File: 9.2.0 (Wow, sudah versi 9!)
  provider: ^6.1.5

  # --- DATABASE ---
  floor: ^1.5.0                    # Lock File: 1.5.0
  sqflite: ^2.4.2                  # Lock File: 2.4.2
  sqlite3_flutter_libs: ^0.5.41

  # --- NETWORKING ---
  dio: ^5.9.1                      # Lock File: 5.9.1 (Terbaru)
  pretty_dio_logger: ^1.4.0
  internet_connection_checker: ^3.0.1
  retrofit: 4.0.1

  # --- DOWNLOAD & STORAGE ---
  archive: ^3.6.1
  crypto: ^3.0.1
  path_provider: ^2.1.2

  # --- UTILITIES ---
  shared_preferences: ^2.5.4
  logger: ^1.3.0                   # (Logging dari dependency logging)

  # --- FEATURES ---
  youtube_player_flutter: ^9.1.3   # Lock File: 9.1.3
  easy_localization: ^3.0.8
  flutter_phoenix: ^1.1.1
  location: ^8.0.1                 # Lock File: 8.0.1
  geocoding: ^4.0.0
  url_launcher: ^6.3.2

  # --- CRITICAL UPDATES (INI YANG BENAR UNTUK ANNIBROS) ---
  wakelock_plus: ^1.4.0            # Pakai Plus! (Sesuai Lock File)
  intl: ^0.20.2                    # Pakai 0.20! (Sesuai Lock File)
  uuid: ^4.5.2

  # --- LAINNYA ---
  conditional_builder_null_safety: ^0.0.6
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- GENERATORS ---
  build_runner: ^2.4.13
  retrofit_generator: 7.0.8
  floor_generator: ^1.5.0
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  bloc_test: ^9.1.7

  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    # - assets/images/quran/  # REMOVED: Quran images now downloaded remotely
    - assets/json/
    - assets/translations/
    - assets/images/pillars/

  fonts:
    - family: ElMessiri
      fonts:
        - asset: assets/fonts/ElMessiri-Bold.ttf
          weight: 700
        - asset: assets/fonts/ElMessiri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ElMessiri-Medium.ttf
          weight: 500
        - asset: assets/fonts/ElMessiri-Regular.ttf
          weight: 400
    - family: UthmanTN
      fonts:
        - asset: assets/fonts/UthmanTNB.ttf
          weight: 700
        - asset: assets/fonts/UthmanTN.ttf
          weight: 400
    - family: me_quran
      fonts:
        - asset: assets/fonts/me_quran.ttf
    - family: Hafs
      fonts:
        - asset: assets/fonts/Hafs.ttf